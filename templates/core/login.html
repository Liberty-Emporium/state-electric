{% extends "base.html" %}

{% block title %}Login — State Electric{% endblock %}

{% block extra_css %}
<style>
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
}
.login-logo {
  text-align: center;
  font-size: 2.5rem;
  margin-bottom: 8px;
}
.login-title {
  text-align: center;
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.login-sub {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 24px;
}
.login-error {
  background: var(--red-bg);
  color: var(--red);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
</style>
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">⚡</div>
    <div class="login-title">State Electric</div>
    <div class="login-sub">Business Management</div>

    {% if form.errors %}
    <div class="login-error">
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-3">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
