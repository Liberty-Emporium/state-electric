{% extends "base.html" %}

{% block title %}Customers — State Electric{% endblock %}

{% block content %}
<div class="page-header">
  <h1>👥 Customers</h1>
  <a href="{% url 'customer-create' %}" class="btn btn-primary btn-sm">+ Add Customer</a>
</div>

<!-- Filters -->
<div class="filters">
  <input type="text" class="form-control" placeholder="Search..." name="q" value="{{ search }}" style="flex:1;min-width:200px;"
    hx-get="{% url 'customer-list' %}"
    hx-target="#customer-table"
    hx-trigger="input changed delay:300ms"
    hx-include="[name='division']">
  <select class="form-select" name="division" style="width:auto;"
    hx-get="{% url 'customer-list' %}"
    hx-target="#customer-table"
    hx-include="[name='q']">
    <option value="">All Divisions</option>
    <option value="commercial" {% if filter_division == 'commercial' %}selected{% endif %}>Commercial</option>
    <option value="residential" {% if filter_division == 'residential' %}selected{% endif %}>Residential</option>
  </select>
</div>

<div class="table-wrap" id="customer-table">
  {% include "core/customer_table.html" %}
</div>
{% endblock %}
