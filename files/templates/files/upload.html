<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Documents - State Electric</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; }
        h1 { color: #60a5fa; margin-bottom: 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #334155; }
        label { display: block; margin: 12px 0 4px; color: #94a3b8; font-size: 0.85rem; }
        input[type="text"], select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; }
        input[type="file"] { margin: 10px 0; color: #94a3b8; }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 16px; }
        button:hover { background: #2563eb; }
        #result { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
        .success { background: rgba(74,222,128,0.2); color: #4ade80; }
        .error { background: rgba(248,113,113,0.2); color: #f87171; }
        .progress { margin-top: 10px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background: #3b82f6; width: 0; transition: width 0.3s; }
        .info { color: #94a3b8; font-size: 0.85rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Documents</h1>
        
        <div class="card">
            <form id="uploadForm">
                <label>File</label>
                <input type="file" id="fileInput" required>
                
            <label>Title (optional)</label>
            <input type="text" id="titleInput" placeholder="Leave blank to use filename">
            
            <label>Category</label>
            <select id="categoryInput">
                <option value="invoice">Invoice</option>
                <option value="work_order">Work Order</option>
                <option value="estimate">Estimate / Quote</option>
                <option value="scan">Scanned Document</option>
                <option value="permit">Permit</option>
                <option value="insurance">Insurance</option>
                <option value="contract">Contract</option>
                <option value="receipt">Receipt</option>
                <option value="other">Other</option>
            </select>
            
            <label>Folder (optional)</label>
            <input type="text" id="folderInput" placeholder="e.g. Invoices 2024">
            
            <button type="submit">Upload File</button>
            
            <div class="progress" id="progressDiv">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div id="result"></div>
        </div>
        
        <p class="info">Files will be stored on the persistent volume at /app/storage and available in the Documents section of the app.</p>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const result = document.getElementById('result');
        const progressDiv = document.getElementById('progressDiv');
        const progressBar = document.getElementById('progressBar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('title', document.getElementById('titleInput').value || file.name);
            formData.append('category', document.getElementById('categoryInput').value);
            formData.append('folder', document.getElementById('folderInput').value);
            
            progressDiv.style.display = 'block';
            result.style.display = 'none';
            progressBar.style.width = '0%';
            
            try {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const pct = (e.loaded / e.total) * 100;
                        progressBar.style.width = pct + '%';
                    }
                });
                
                xhr.addEventListener('load', () => {
                    const response = JSON.parse(xhr.responseText);
                    progressDiv.style.display = 'none';
                    
                    if (response.success) {
                        result.className = 'success';
                        result.innerHTML = 'Uploaded: <strong>' + response.title + '</strong> (' + response.category + ')';
                        result.style.display = 'block';
                        form.reset();
                    } else {
                        result.className = 'error';
                        result.innerHTML = 'Error: ' + (response.error || 'Upload failed');
                        result.style.display = 'block';
                    }
                });
                
                xhr.addEventListener('error', () => {
                    progressDiv.style.display = 'none';
                    result.className = 'error';
                    result.innerHTML = 'Upload failed. Please try again.';
                    result.style.display = 'block';
                });
                
                xhr.open('POST', '/api/files/upload/');
                xhr.send(formData);
            } catch (err) {
                progressDiv.style.display = 'none';
                result.className = 'error';
                result.innerHTML = 'Error: ' + err.message;
                result.style.display = 'block';
            }
        });
    </script>
</body>
</html>
